# EchoFlow configuration
# Copy to ~/.config/echoflow/config.toml and customize.
# All values shown are defaults — omit any you don't need to change.

[audio]
# device = ""              # PipeWire device name (empty = system default)
sample_rate = 16000
# mode = "toggle"          # "toggle" or "push_to_talk"

[stt]
model = "large-v3-turbo"
device = "cuda"
compute_type = "float16"
language = "en"

[refiner]
enabled = true
ollama_url = "http://127.0.0.1:11434"
model = "echoflow-refiner"         # Build with: ollama create echoflow-refiner -f contrib/Modelfile
temperature = 0.2

[overlay]
enabled = true                  # Set to false to disable the GTK4 overlay UI

[injector]
type_delay_ms = 0
clipboard_threshold = 500   # Characters above which clipboard paste is used

[dictionary]
# path = "~/.config/echoflow/dictionary.txt"
